name: HA-Overwatch
description: >
  Floor plan based alarm and monitoring dashboard for Home Assistant.
  Features live zone monitoring, HA entity integration, per-zone arm/disarm,
  and camera/light/siren device linking.
version: "0.30"
slug: ha_overwatch
url: https://github.com/DM-AU/ha-overwatch
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
map:
  - config:rw
homeassistant_api: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: HA-Overwatch web dashboard
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:shield-home
panel_title: Overwatch