<!-- ZOOM CONTROLS -->
<div class="zoom-controls">
  <button class="zoom-btn" id="zoomIn" title="Zoom in" aria-label="Zoom in">
    <svg class="zoom-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="6.5" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
      <path d="M16.5 16.5L21 21" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 11h6M11 8v6" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="zoom-btn" id="zoomOut" title="Zoom out" aria-label="Zoom out">
    <svg class="zoom-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="6.5" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
      <path d="M16.5 16.5L21 21" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <path d="M8 11h6" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="zoom-btn" id="zoomReset" title="Reset zoom" aria-label="Reset zoom">
    <svg class="zoom-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3.51 9a9 9 0 1 1-.5 4" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
      <path d="M3 3v6h6" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
